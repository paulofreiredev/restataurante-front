<header class="admin-header">
  <div class="header-brand">
    <svg viewBox="0 0 64 64" class="header-logo">
      <circle cx="32" cy="32" r="32" fill="#d32f2f"/>
      <ellipse cx="32" cy="38" rx="18" ry="5" fill="none" stroke="white" stroke-width="2.5"/>
      <ellipse cx="32" cy="33" rx="18" ry="5" fill="none" stroke="white" stroke-width="2.5"/>
      <path d="M14 33 Q14 18 32 18 Q50 18 50 33" fill="none" stroke="white" stroke-width="2.5"/>
    </svg>
    <span class="header-title">Restataurante <em>Admin</em></span>
  </div>

  <nav class="header-nav">
    <a routerLink="/admin/products" routerLinkActive="nav-active" class="nav-link">
      <mat-icon>menu_book</mat-icon> Cardápio
    </a>
    <a routerLink="/admin/orders" routerLinkActive="nav-active" class="nav-link">
      <mat-icon>receipt_long</mat-icon> Pedidos
    </a>
  </nav>

  <div class="header-actions">
    <span class="admin-chip"><mat-icon>account_circle</mat-icon> admin</span>
    <button mat-stroked-button (click)="logout()">
      <mat-icon>logout</mat-icon> Sair
    </button>
  </div>
</header>
