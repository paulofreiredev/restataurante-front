<app-header></app-header>

<div class="menu-grid">
  @for (product of products(); track product.id) {
    <app-food-card
      [id]="product.id"
      [name]="product.name"
      [description]="product.description"
      [price]="product.price"
      [imageUrl]="product.imageUrl">
    </app-food-card>
  }
</div>

<button mat-fab extended color="primary" class="fab-concluir" routerLink="/client/checkout">
  CONCLUIR
</button>

<app-footer></app-footer>
