server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm;
    gzip_min_length 1024;

    # Cache agressivo para assets com hash no nome (gerados pelo Angular)
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|webp|svg|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html não deve ser cacheado (sempre servir o mais recente)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback: qualquer rota desconhecida serve o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Oculta a versão do nginx nos headers de erro
    server_tokens off;
}
